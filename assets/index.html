<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#6c5bd9"
    />
    <meta name="msapplication-TileColor" content="#f24e29" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="shortcut icon" href="images/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="site.webmanifest" />
    <link
      rel="mask-icon"
      href="images/favicon/safari-pinned-tab.svg"
      color="#6c5bd9"
    />

    <link
      rel="apple-touch-startup-image"
      href="images/screens/launch-640x1136.png"
      media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="images/screens/launch-750x1294.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="images/screens/launch-1242x2148.png"
      media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="images/screens/launch-1125x2436.png"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="images/screens/launch-1536x2048.png"
      media="(min-device-width: 768px) and (max-device-width: 1024px) and (-webkit-min-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="images/screens/launch-1668x2224.png"
      media="(min-device-width: 834px) and (max-device-width: 834px) and (-webkit-min-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="images/screens/launch-2048x2732.png"
      media="(min-device-width: 1024px) and (max-device-width: 1024px) and (-webkit-min-device-pixel-ratio: 2) and (orientation: portrait)"
    />

    <title>Le Rocher Academie</title>

    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"
    />
  </head>
  <body>
    <ion-app data-current-url="{{currentPath}}">
      <ion-split-pane when="md" content-id="main">
        <ion-menu content-id="main">
          <ion-header class="ion-no-border">
            <ion-toolbar color="body">
              <ion-title></ion-title>
              <ion-img
                src="images/logo.svg"
                alt="Logo le rocher Academie"
                class="logo"
              ></ion-img>
            </ion-toolbar>
          </ion-header>
          <ion-content class="ion-padding"> </ion-content>
          <ionic-footer>Hors ligne</ionic-footer>
        </ion-menu>

        <div class="ion-page" id="main">
          <ion-header>
            <ion-toolbar color="app">
              <ion-buttons slot="start">
                <ion-menu-button class="ion-hide-sm-up"></ion-menu-button>
              </ion-buttons>
              <ion-title>Rocher Academie</ion-title>
            </ion-toolbar>
          </ion-header>
          <ion-content>
            <ion-refresher id="refresher" slot="fixed">
              <ion-refresher-content></ion-refresher-content>
            </ion-refresher>
            <h2>Mode hors connexion</h2>
          </ion-content>
          <ion-footer>
            <ion-toolbar>
              <ion-title class="fs-5">
                2024 &copy; Le Rocher Academie. Tous droits réservés
              </ion-title>
            </ion-toolbar>
          </ion-footer>
        </div>
      </ion-split-pane>
    </ion-app>
    <script defer>
      async function run() {
        const reponse = await fetch("http://localhost:8000/", {
          method: "GET",
          mode: "no-cors",
        });
        let appContentHTML = await reponse.text();

        console.log("appContentHTML", appContentHTML);
      }

      run();
    </script>
  </body>
</html>
