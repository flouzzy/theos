---
# Development environment override
services:
  php:
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - /app/vendor
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      - ./frankenphp/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint:ro
      # If you develop on Mac or Windows you can remove the vendor/ directory
      #  from the bind-mount for better performance by enabling the next line:
      # - /app/vendor
    environment:
      # FRANKENPHP_WORKER_CONFIG: watch
      SERVER_NAME: ${SERVER_NAME:-localhost}
      MERCURE_EXTRA_DIRECTIVES: demo
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true
    depends_on:
      - database
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:2019/metrics"
      start_period: 180s
      interval: 10s
      timeout: 3s
      retries: 3

  worker:
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - ./frankenphp/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint:ro
    environment:
      STABILITY: stable
      SYMFONY_VERSION: ""
      MAILER_DSN: smtp://mailer:1025
    healthcheck:
      test:
        - "CMD"
        - "php"
        - "bin/console"
        - "about"
        - "--no-ansi"
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3

  database:
    image: mysql:${MYSQL_VERSION:-8.0}
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-!ChangeMe!}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-!ChangeMe!}
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "localhost"
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/mysql:rw

  ###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "${PUB_MAILER_SMTP_PORT:-1025}:1025"
      - "${PUB_MAILER_HTTP_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###

volumes:
  database_data:

    ###> symfony/mercure-bundle ###
    ###< symfony/mercure-bundle ###
