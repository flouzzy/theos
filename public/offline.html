<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e1b4b" />
  <title>Hors connexion — Le Rocher Académie</title>
  <link rel="icon" href="/images/favicon/favicon-32x32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/images/favicon/apple-touch-icon.png" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .logo {
      width: 80px;
      height: auto;
      margin-bottom: 1.5rem;
    }

    .icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background: #f1f5f9;
      border-radius: 50%;
      margin-bottom: 1.5rem;
    }

    .icon-wrapper svg {
      width: 36px;
      height: 36px;
      color: #6366f1;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }

    p {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.75rem;
      transition: all 0.3s ease;
    }

    .status-badge.offline {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .status-badge.online {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .dot.pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
    }

    .btn:hover {
      background: #4f46e5;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      cursor: not-allowed;
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="/images/logo.svg" alt="Le Rocher Académie" class="logo" onerror="this.style.display='none'" />

    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
      </svg>
    </div>

    <div id="statusBadge" class="status-badge offline">
      <span class="dot pulse"></span>
      <span id="statusText">Hors connexion</span>
    </div>

    <h1>Pas de connexion internet</h1>
    <p>Vérifiez votre connexion Wi-Fi ou données mobiles. La page se rechargera automatiquement dès que la connexion
      sera rétablie.</p>

    <button class="btn" id="retryBtn" onclick="retryConnection()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
      Réessayer
    </button>
  </div>

  <footer>
    &copy; <span id="year"></span> Le Rocher Académie. Tous droits réservés.
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function updateStatus(isOnline) {
      const badge = document.getElementById('statusBadge');
      const text = document.getElementById('statusText');
      const btn = document.getElementById('retryBtn');
      const dot = badge.querySelector('.dot');

      if (isOnline) {
        badge.className = 'status-badge online';
        text.textContent = 'Connexion rétablie !';
        dot.classList.remove('pulse');
        btn.disabled = false;
        // Redirection automatique après 1s
        setTimeout(() => { window.location.href = '/'; }, 1200);
      } else {
        badge.className = 'status-badge offline';
        text.textContent = 'Hors connexion';
        dot.classList.add('pulse');
      }
    }

    function retryConnection() {
      const btn = document.getElementById('retryBtn');
      btn.disabled = true;
      btn.textContent = 'Vérification...';

      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(() => { window.location.href = '/'; })
        .catch(() => {
          btn.disabled = false;
          btn.innerHTML = `
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
              </svg>
              Réessayer
            `;
        });
    }

    window.addEventListener('online', () => updateStatus(true));
    window.addEventListener('offline', () => updateStatus(false));
    updateStatus(navigator.onLine);
  </script>
</body>

</html>
