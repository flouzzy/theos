framework:
    html_sanitizer:
        sanitizers:
            default:
                allow_safe_elements: true
                max_input_length: 500000
            notification:
                allow_safe_elements: true
                max_input_length: 500000
                allow_elements:
                    callout: '*'
            video:
                allow_safe_elements: true
                max_input_length: 500000
                allow_elements:
                    iframe: ['src', 'width', 'height', 'frameborder', 'allow', 'allowfullscreen', 'title']
                    div: ['class', 'style']
                    p: '*'
                    br: '*'
