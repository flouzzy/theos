framework:
    html_sanitizer:
        sanitizers:
            app.default_sanitizer:
                allow_safe_elements: true
            app.notification_sanitizer:
                allow_safe_elements: true
                allow_elements:
                    callout: '*'
            app.video_sanitizer:
                allow_safe_elements: true
                allow_elements:
                    iframe: ['src', 'width', 'height', 'frameborder', 'allow', 'allowfullscreen', 'title']
                    div: ['class', 'style']
                    p: '*'
                    br: '*'
