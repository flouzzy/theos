framework:
  html_sanitizer:
    sanitizers:
      default:
        allow_elements:
          - 'a'
          - 'br'
          - 'div'
          - 'em'
          - 'h1'
          - 'h2'
          - 'h3'
          - 'h4'
          - 'h5'
          - 'h6'
          - 'img'
          - 'li'
          - 'ol'
          - 'p'
          - 'span'
          - 'strong'
          - 'u'
          - 'ul'
        allow_attributes:
          'href': ['a']
          'src': ['img']
          'alt': ['img']
          'class': '*'
