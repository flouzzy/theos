# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  upload_directory: "%kernel.project_dir%/public/uploads"
  app.jwtsecret: "%env(APP_JWTSECRET)%"
  brevo_api_key: "%env(BREVO_API_KEY)%"
  brevo_template_id: "%env(BREVO_TEMPLATE_ID)%"
  brevo_from_name: "%env(BREVO_FROM_NAME)%"
  brevo_from_email: "%env(BREVO_FROM_EMAIL)%"
  brevo_list_id: "%env(BREVO_LIST_ID)%"
  brevo_subject: "%env(BREVO_SUBJECT)%"
  default_from_email: "%env(DEFAULT_FROM_EMAIL)%"
  default_from_name: "%env(DEFAULT_FROM_NAME)%"

services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    bind:
      string $brevoApiKey: "%env(BREVO_API_KEY)%"
      string $brevoFromName: "%env(BREVO_FROM_NAME)%"
      string $brevoFromEmail: "%env(BREVO_FROM_EMAIL)%"
      string $brevoSubject: "%env(BREVO_SUBJECT)%"
      string $brevoListId: "%env(BREVO_LIST_ID)%"
      string $kernelEnvironment: "%kernel.environment%"
      string $defaultFromEmail: "%default_from_email%"
      string $defaultFromName: "%default_from_name%"

  # makes classes in src/ available to be used as services
  # this creates a service per class whose id is the fully-qualified class name
  App\:
    resource: "../src/"
    exclude:
      - "../src/DependencyInjection/"
      - "../src/Entity/"
      - "../src/Kernel.php"

  # add more service definitions when explicit configuration is needed
  # please note that last definitions always *replace* previous ones
  App\Service\MediaManager:
    arguments:
      $targetDirectory: "%upload_directory%"

  Redis:
    class: Redis
    factory: ['Symfony\Component\Cache\Adapter\RedisAdapter', 'createConnection']
    arguments: ['%env(REDIS_URL)%']

  Symfony\Component\HttpFoundation\Session\Storage\Handler\RedisSessionHandler:
    arguments:
      - '@Redis'
